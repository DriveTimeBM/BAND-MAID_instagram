<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAND-MAID Instagram Archive</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  :root {
    --gold: #c8a96e;
    --gold-dim: #a08550;
    --gold-bg: rgba(200,169,110,0.08);
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --border: rgba(255,255,255,0.08);
    --border-gold: rgba(200,169,110,0.3);
    --text: #e8e6e1;
    --text-muted: #888;
    --text-dim: #555;
    --radius: 8px;
    --row-h: 110;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border-gold);
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 18px;
    font-weight: normal;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    font-family: monospace;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--gold-dim); }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }
  .date-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .date-group input[type=date] {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 9px;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    color-scheme: dark;
  }
  .date-group input[type=date]:focus { border-color: var(--gold-dim); }
  .date-sep { color: var(--text-dim); font-size: 11px; }
  .members {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 10px;
  }
  .chip {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    letter-spacing: 0.03em;
  }
  .chip:hover { border-color: var(--gold-dim); color: var(--gold-dim); }
  .chip.active {
    background: var(--gold-bg);
    border-color: var(--gold);
    color: var(--gold);
  }
  .chip.all.active { background: rgba(255,255,255,0.05); border-color: var(--text-muted); color: var(--text); }
  .stats {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: monospace;
  }
  .stats span { color: var(--gold); }

  /* MAIN */
  main { padding: 0; }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 16px;
    color: var(--text-muted);
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-text { font-size: 13px; letter-spacing: 0.05em; }
  .load-sub { font-size: 11px; color: var(--text-dim); font-family: monospace; }
  .progress-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 0.3s;
  }

  /* VIRTUAL SCROLLER */
  .scroller-container {
    overflow-y: auto;
    height: calc(100vh - 200px);
    position: relative;
  }
  .scroller-spacer { position: relative; width: 100%; }
  .scroller-visible { position: absolute; top: 0; left: 0; width: 100%; }

  /* TWEET CARD */
  .tweet {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    transition: background 0.1s;
  }
  .tweet:hover { background: var(--bg2); }
  .tweet-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-right: 16px;
    border-right: 1px solid var(--border);
  }
  .tweet-date {
    font-size: 11px;
    color: var(--text-muted);
    font-family: monospace;
    line-height: 1.4;
  }
  .tweet-date-year { color: var(--text-dim); font-size: 10px; }
  .member-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    margin-top: 2px;
    font-family: sans-serif;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
  }
  .tweet-body { padding-left: 16px; }
  .tweet-en {
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 5px;
  }
  .tweet-en mark {
    background: rgba(200,169,110,0.25);
    color: var(--gold);
    border-radius: 2px;
    padding: 0 1px;
  }
  .tweet-jp {
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 5px;
  }
  .tweet-link {
    color: var(--text-dim);
    font-size: 11px;
    text-decoration: none;
    font-family: monospace;
    transition: color 0.15s;
  }
  .tweet-link:hover { color: var(--gold); }

  /* MEMBER COLORS */
  .m-BAND-MAID  { background: rgba(255,255,255,0.08); color: #e8e6e1; }
  .m-Saiki      { background: rgba(80,140,200,0.18);  color: #6aadee; }
  .m-Miku       { background: rgba(180,80,120,0.18);  color: #e87aab; }
  .m-Kanami     { background: rgba(100,180,120,0.18); color: #70d490; }
  .m-Akane      { background: rgba(200,169,110,0.15); color: #c8a96e; }
  .m-MISA       { background: rgba(150,100,200,0.18); color: #b87aee; }

  .no-results {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    font-family: monospace;
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .tweet { grid-template-columns: 70px 1fr; padding: 10px 12px; }
    .controls { flex-direction: column; align-items: stretch; }
    .date-group { flex-wrap: wrap; }
    h1 { font-size: 15px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>BAND-MAID Instagram Archive</h1>
    <span class="subtitle" id="total-count">loading…</span>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search posts…" autocomplete="off" spellcheck="false">
    </div>
    <div class="date-group">
      <input type="date" id="date-from" title="From date">
      <span class="date-sep">–</span>
      <input type="date" id="date-to" title="To date">
      <button class="chip" id="clear-dates" style="white-space:nowrap">✕ dates</button>
    </div>
  </div>
  <div class="members" id="members"></div>
  <div class="stats" id="stats"></div>
</div>

<main>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="load-text">Loading Instagram archive…</div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="load-sub" id="load-sub">Fetching instagram.json</div>
  </div>
  <div id="scroller" class="scroller-container" style="display:none">
    <div class="scroller-spacer" id="spacer">
      <div class="scroller-visible" id="visible"></div>
    </div>
  </div>
</main>

<script>
const MEMBERS = ['BAND-MAID','Saiki','Miku','Kanami','Akane','MISA'];
const ROW_H = 112;
const BUFFER = 5;

let allTweets = [];
let filtered = [];
let activeMember = 'all';
let searchQuery = '';
let dateFrom = null;
let dateTo = null;
let scrollerEl, spacerEl, visibleEl;
let lastScrollTop = -1;
let rafId = null;

// Build member chips
const membersDiv = document.getElementById('members');
['all', ...MEMBERS].forEach(m => {
  const btn = document.createElement('button');
  btn.className = 'chip' + (m === 'all' ? ' all active' : '');
  btn.textContent = m === 'all' ? 'All Members' : m;
  btn.dataset.member = m;
  btn.onclick = () => {
    activeMember = m;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  };
  membersDiv.appendChild(btn);
});

// Load data
async function loadData() {
  const prog = document.getElementById('progress');
  const sub = document.getElementById('load-sub');
  try {
    const resp = await fetch('instagram.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const total = parseInt(resp.headers.get('content-length') || '0');
    const reader = resp.body.getReader();
    const chunks = [];
    let received = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      if (total) {
        prog.style.width = Math.round(received / total * 100) + '%';
        sub.textContent = `${(received/1048576).toFixed(1)} / ${(total/1048576).toFixed(1)} MB`;
      }
    }
    sub.textContent = 'Parsing…';
    prog.style.width = '90%';
    await new Promise(r => setTimeout(r, 10));
    const text = new TextDecoder().decode(concatBuffers(chunks));
    allTweets = JSON.parse(text);
    prog.style.width = '100%';
    sub.textContent = `${allTweets.length.toLocaleString()} posts loaded`;
    await new Promise(r => setTimeout(r, 200));
    init();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#e87a7a;font-family:monospace;font-size:13px">
        Failed to load instagram.json<br><small style="color:#666">${e.message}</small><br><br>
        <small>Make sure instagram.json is in the same directory as index.html</small>
      </div>`;
  }
}

function concatBuffers(chunks) {
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  for (const c of chunks) { out.set(c, offset); offset += c.length; }
  return out;
}

function init() {
  // Pre-process: add search string and date timestamp
  allTweets.forEach(t => {
    t._search = ((t.en || '') + ' ' + (t.jp || '')).toLowerCase();
    t._ts = t.dateJST ? new Date(t.dateJST).getTime() : 0;
    t._dateStr = t.dateJST ? t.dateJST.slice(0,10) : '';
    t._dateDisplay = formatDate(t.dateJST);
  });

  document.getElementById('total-count').textContent = `${allTweets.length.toLocaleString()} posts`;
  document.getElementById('loading').style.display = 'none';

  scrollerEl = document.getElementById('scroller');
  spacerEl   = document.getElementById('spacer');
  visibleEl  = document.getElementById('visible');
  scrollerEl.style.display = 'block';

  scrollerEl.addEventListener('scroll', onScroll, { passive: true });

  applyFilters();
  setupInputs();
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  const day = String(d.getDate()).padStart(2,'0');
  const hr  = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return { mon, day, yr: d.getFullYear(), time: `${hr}:${min}`, full: `${mon} ${day} ${d.getFullYear()}` };
}

function setupInputs() {
  const searchEl = document.getElementById('search');
  const fromEl   = document.getElementById('date-from');
  const toEl     = document.getElementById('date-to');

  let debounce;
  searchEl.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { searchQuery = searchEl.value.trim().toLowerCase(); applyFilters(); }, 180);
  });

  fromEl.addEventListener('change', () => { dateFrom = fromEl.value || null; applyFilters(); });
  toEl.addEventListener('change', () => { dateTo = toEl.value || null; applyFilters(); });

  document.getElementById('clear-dates').addEventListener('click', () => {
    dateFrom = dateTo = null;
    fromEl.value = toEl.value = '';
    applyFilters();
  });
}

function applyFilters() {
  const q = searchQuery;
  const fromMs = dateFrom ? new Date(dateFrom + 'T00:00:00').getTime() : null;
  const toMs   = dateTo   ? new Date(dateTo   + 'T23:59:59').getTime() : null;

  filtered = allTweets.filter(t => {
    if (activeMember !== 'all' && t.member !== activeMember) return false;
    if (fromMs && t._ts < fromMs) return false;
    if (toMs   && t._ts > toMs)   return false;
    if (q && !t._search.includes(q)) return false;
    return true;
  });

  const statsEl = document.getElementById('stats');
  if (filtered.length === allTweets.length) {
    statsEl.textContent = '';
  } else {
    statsEl.innerHTML = `Showing <span>${filtered.length.toLocaleString()}</span> of ${allTweets.length.toLocaleString()} posts`;
  }

  if (scrollerEl) {
    scrollerEl.scrollTop = 0;
    renderVirtual(true);
  }
}

function onScroll() {
  if (rafId) return;
  rafId = requestAnimationFrame(() => {
    rafId = null;
    renderVirtual(false);
  });
}

function renderVirtual(force) {
  const st = scrollerEl.scrollTop;
  if (!force && Math.abs(st - lastScrollTop) < ROW_H / 2) return;
  lastScrollTop = st;

  const viewH = scrollerEl.clientHeight;
  const total = filtered.length;
  const totalH = total * ROW_H;
  spacerEl.style.height = totalH + 'px';

  if (total === 0) {
    visibleEl.innerHTML = '<div class="no-results">No posts match your search.</div>';
    return;
  }

  const startIdx = Math.max(0, Math.floor(st / ROW_H) - BUFFER);
  const endIdx   = Math.min(total - 1, Math.ceil((st + viewH) / ROW_H) + BUFFER);

  visibleEl.style.top = (startIdx * ROW_H) + 'px';

  const q = searchQuery;
  const html = [];
  for (let i = startIdx; i <= endIdx; i++) {
    html.push(renderTweet(filtered[i], q));
  }
  visibleEl.innerHTML = html.join('');
}

function highlight(text, q) {
  if (!q || !text) return escHtml(text || '');
  const escaped = escHtml(text);
  const escapedQ = escHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(escapedQ, 'gi'), m => `<mark>${m}</mark>`);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTweet(t, q) {
  const d = t._dateDisplay;
  const mClass = 'm-' + (t.member || 'BAND-MAID').replace(/[^a-zA-Z-]/g,'');
  const enHL = highlight(t.en, q);
  const jpText = t.jp ? `<div class="tweet-jp">${escHtml(t.jp)}</div>` : '';
  const linkEl = t.url ? `<a class="tweet-link" href="${escHtml(t.url)}" target="_blank" rel="noopener">↗ original post</a>` : '';

  return `<div class="tweet">
    <div class="tweet-meta">
      <div class="tweet-date">
        <div>${d.mon} ${d.day}</div>
        <div class="tweet-date-year">${d.yr} ${d.time}</div>
      </div>
      <span class="member-badge ${mClass}">${escHtml(t.member || '')}</span>
    </div>
    <div class="tweet-body">
      <div class="tweet-en">${enHL}</div>
      ${jpText}
      ${linkEl}
    </div>
  </div>`;
}

loadData();
</script>
</body>
</html>
